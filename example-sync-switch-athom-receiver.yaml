substitutions:
  name: "syncswitch-receiver"
  friendly_name: "SyncSwitch Receiver"
  log_level: WARN

packages:
  Athom Technology.Smart Plug V3: github://AminKAli/esphome-syncswitch/esp32-configs/athom-smart-plug.yaml@main

external_components:
  - source: github://AminKAli/esphome-syncswitch@c4aff1621
    components: [basic_espnow]

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

api:
  encryption:
    key: ijhnYwoN4UN/B4xDBbkRQkSR6v2qJCSZ/p+8sl3rxgc=

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: "${wifi_fast_connect}"
  domain: "${dns_domain}"

captive_portal:

web_server: {}

logger:
  level: ${log_level}

custom_component:
  - lambda: |-
      auto espnow = new esphome::basic_espnow::BasicESPNow();
      espnow->set_on_message_callback([](const uint8_t *mac, const uint8_t *data, int len) {
        std::string msg((const char*)data, len);
        ESP_LOGI("espnow", "Received from %02x:%02x:%02x:%02x:%02x:%02x: %s",
          mac[0], mac[1], mac[2], mac[3], mac[4], mac[5], msg.c_str());
      });
      return {espnow};

basic_espnow:
  peer_mac: "24:6F:28:12:34:56"
  on_message:
    - lambda: |-
        ESP_LOGI("espnow", "Received in YAML: %s", message.c_str());
        if (message == "ping") {
          id(my_led).turn_on();
        }

